<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration Form - Pure Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
        body{
            
            background: linear-gradient(to right ,#1b75ff,#c516ff);
        }
    </style>
</head>
<body class="min-vh-100 d-flex align-items-center py-5">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 col-xl-7">
        
        <div class="card shadow-lg border-0 rounded-3">
          
          <div class="card-header bg-dark text-white text-center py-3 fw-bold rounded-top-3">
            EVENT REGISTRATION FORM
          </div>
          
          <div class="card-body p-4 p-md-5">
            <form>
              
              <div class="row mb-4">
                <label class="col-sm-3 col-form-label fw-bold text-dark text-sm-end text-start">Name</label>
                <div class="col-sm-9">
                  <div class="row g-3">
                    <div class="col-sm-6">
                      <input type="text" class="form-control bg-light border-0 py-2">
                      <div class="small text-secondary mt-1">First Name</div>
                    </div>
                    <div class="col-sm-6">
                      <input type="text" class="form-control bg-light border-0 py-2">
                      <div class="small text-secondary mt-1">Last Name</div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="row mb-4">
                <label class="col-sm-3 col-form-label fw-bold text-dark text-sm-end text-start">Company</label>
                <div class="col-sm-9">
                  <input type="text" class="form-control bg-light border-0 py-2">
                </div>
              </div>

              <div class="row mb-4">
                <label class="col-sm-3 col-form-label fw-bold text-dark text-sm-end text-start">Email</label>
                <div class="col-sm-9">
                  <input type="email" class="form-control bg-light border-0 py-2" placeholder="example@email.com">
                </div>
              </div>

              <div class="row mb-4">
                <label class="col-sm-3 col-form-label fw-bold text-dark text-sm-end text-start">Phone</label>
                <div class="col-sm-9">
                  <div class="row g-3">
                    <div class="col-sm-4">
                      <input type="text" class="form-control bg-light border-0 py-2">
                      <div class="small text-secondary mt-1">Area Code</div>
                    </div>
                    <div class="col-sm-8">
                      <input type="text" class="form-control bg-light border-0 py-2">
                      <div class="small text-secondary mt-1">Phone Number</div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="row mb-4">
                <label class="col-sm-3 col-form-label fw-bold text-dark text-sm-end text-start">Subject</label>
                <div class="col-sm-9">
                  <select class="form-select bg-light border-0 py-2">
                    <option selected disabled>Choose Option</option>
                    <option value="1">General Inquiry</option>
                    <option value="2">Sponsorship</option>
                    <option value="3">Ticketing</option>
                  </select>
                </div>
              </div>

              <div class="row mb-4">
                <div class="col-sm-3"></div> <div class="col-sm-9">
                  <div class="fw-bold text-dark mb-2">Are you an existing customer?</div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="existingCustomer" id="customerYes" value="yes" checked>
                    <label class="form-check-label text-secondary" for="customerYes">Yes</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="existingCustomer" id="customerNo" value="no">
                    <label class="form-check-label text-secondary" for="customerNo">No</label>
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-sm-3"></div> <div class="col-sm-9">
                  <button type="button" class="btn btn-danger px-4 py-2 fw-bold rounded-1">REGISTER</button>
                </div>
              </div>

            </form>
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
