<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to GitHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light d-flex flex-column align-items-center pt-5">
    <div class="mb-3 mt-4 text-center">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTsYTjyh44RhauzxLL32iEwhz6Tghe6vaAz377Xbrr0lg&s" alt="Logo" width="48" height="48" class="rounded-circle">
    </div>
    <h1 class="h4 fw-light mb-3">Sign in to GitHub</h1>
    <div class="w-100 px-3" style="max-width: 340px;">
        <div class="card border mb-3">
            <div class="card-body bg-white rounded p-3">
                <form>
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold" style="font-size: 14px;">Username or email address</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-baseline">
                            <label for="password" class="form-label fw-semibold" style="font-size: 14px;">Password</label>
                            <a href="#" class="text-decoration-none" style="font-size: 12px;">Forgot password?</a>
                        </div>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">Sign in</button>
                </form>
            </div>
        </div>
        <div class="card border mb-5">
            <div class="card-body bg-white rounded text-center p-3" style="font-size: 14px;">
                New to GitHub? <a href="#" class="text-decoration-none">Create an account.</a>
            </div>
        </div>
    </div>
    <div class="d-flex gap-3 mt-4 pt-3 small justify-content-center">
        <a href="#" class="text-decoration-none text-secondary hover-primary">Terms</a>
        <a href="#" class="text-decoration-none text-secondary">Privacy</a>
        <a href="#" class="text-decoration-none text-secondary">Security</a>
        <a href="#" class="text-decoration-none text-secondary">Contact</a>
    </div>

</body>
</html>
